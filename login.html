<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sistema de Chamados</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 20% 20%, #4c1d95, transparent 50%),
                radial-gradient(circle at 80% 30%, #7c2d3e, transparent 50%),
                radial-gradient(circle at 50% 80%, #1e3a8a, transparent 50%),
                #0a0a12;
    color: #fff;
  }
  .card {
    width: 340px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 36px 28px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .avatar svg { width: 36px; height: 36px; opacity: 0.8; }

  .field { border-bottom: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; gap: 10px; padding: 10px 2px; margin-bottom: 18px; }
  .field svg { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
  .field input {
    flex: 1; background: transparent; border: none; color: #fff; font-size: 14px; outline: none;
  }
  .field input::placeholder { color: rgba(255,255,255,0.5); }

  .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 20px; color: rgba(255,255,255,0.75); }
  .row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .row a { color: rgba(255,255,255,0.75); text-decoration: none; font-style: italic; cursor: pointer; }
  .row a:hover { color: #fff; }

  .btn-login {
    width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #6d28d9, #3b5bdb);
    color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer;
  }
  .btn-login:hover { opacity: 0.92; }

  .divider {
    display: flex; align-items: center; gap: 10px; margin: 18px 0 14px;
    color: rgba(255,255,255,0.5); font-size: 11px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.2); }

  .google-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 10px; background: rgba(255,255,255,0.95); color: #1f2937; border: none;
    border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .google-btn svg { width: 16px; height: 16px; }
  .google-btn:hover { background: #fff; }

  .toggle-mode { text-align: center; font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 16px; }
  .toggle-mode a { color: #a78bfa; cursor: pointer; text-decoration: none; }

  .status { margin-top: 14px; font-size: 12px; text-align: center; color: rgba(255,255,255,0.6); min-height: 16px; }
  .status.error { color: #fca5a5; }
</style>
</head>
<body>

<div class="card">
  <div class="avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </div>

  <div class="field">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
    <input type="email" id="email" placeholder="Email">
  </div>
  <div class="field">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    <input type="password" id="password" placeholder="Senha">
  </div>

  <div class="row">
    <label><input type="checkbox" id="remember" checked> Lembrar de mim</label>
    <a id="forgotLink">Esqueci a senha</a>
  </div>

  <button class="btn-login" id="btnLogin">ENTRAR</button>

  <div class="divider">OU CONTINUE COM</div>

  <button class="google-btn" id="btnGoogle">
    <svg viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.7 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.4-.4-3.5z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.5 29.6 4.5 24 4.5c-7.7 0-14.3 4.4-17.7 10.2z"/>
      <path fill="#4CAF50" d="M24 43.5c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4C29.6 34.6 27 35.5 24 35.5c-5.4 0-9.9-3.3-11.3-8H5.9v5.2C9.3 39.1 16 43.5 24 43.5z"/>
      <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.7 2.1-2 3.9-3.7 5.2l6.6 5.4C41.9 35.8 43.5 30.2 43.5 24c0-1.2-.1-2.4-.4-3.5z"/>
    </svg>
    Continuar com Google
  </button>

  <div class="toggle-mode" id="toggleModeText">Nao tem conta? <a id="toggleLink">Criar conta</a></div>

  <div class="status" id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://brlprkcmxxoiyxmcapww.supabase.co/rest/v1/';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJybHBya2NteHhvaXl4bWNhcHd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjEyNDUsImV4cCI6MjA5MDM5NzI0NX0.e94z1xlTNzsIcwhGamlK1b5CE4Kx2rk1g1fdmUgHKKM';
  const ALLOWED_EMAILS = [];

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let isSignup = false;
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const btnLogin = document.getElementById('btnLogin');
  const toggleLink = document.getElementById('toggleLink');
  const toggleModeText = document.getElementById('toggleModeText');
  const statusEl = document.getElementById('status');

  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (isError ? ' error' : '');
  }

  function isAllowed(email) {
    if (ALLOWED_EMAILS.length === 0) return true;
    return ALLOWED_EMAILS.includes(email);
  }

  toggleLink.addEventListener('click', () => {
    isSignup = !isSignup;
    btnLogin.textContent = isSignup ? 'CRIAR CONTA' : 'ENTRAR';
    toggleModeText.innerHTML = isSignup
      ? 'Ja tem conta? <a id="toggleLink">Entrar</a>'
      : 'Nao tem conta? <a id="toggleLink">Criar conta</a>';
    document.getElementById('toggleLink').addEventListener('click', () => toggleLink.click());
    setStatus('');
  });

  btnLogin.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if (!email || !password) return setStatus('Preencha email e senha.', true);

    if (isSignup) {
      setStatus('Criando conta...');
      const result = await supabase.auth.signUp({ email, password });
      if (result.error) return setStatus(result.error.message, true);
      return setStatus('Conta criada! Verifique seu email para confirmar.');
    }

    setStatus('Entrando...');
    const result = await supabase.auth.signInWithPassword({ email, password });
    if (result.error) return setStatus(result.error.message, true);

    if (!isAllowed(result.data.user.email)) {
      await supabase.auth.signOut();
      return setStatus('Acesso nao autorizado.', true);
    }
    window.location.href = '/index.html';
  });

  document.getElementById('forgotLink').addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email) return setStatus('Digite seu email acima primeiro.', true);
    const result = await supabase.auth.resetPasswordForEmail(email);
    if (result.error) return setStatus(result.error.message, true);
    setStatus('Link de recuperacao enviado por email.');
  });

  document.getElementById('btnGoogle').addEventListener('click', async () => {
    setStatus('Redirecionando para o Google...');
    const result = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/index.html' }
    });
    if (result.error) setStatus('Erro: ' + result.error.message, true);
  });

  (async () => {
    const sessionResult = await supabase.auth.getSession();
    const session = sessionResult.data.session;
    if (session && isAllowed(session.user.email)) {
      window.location.href = '/index.html';
    }
  })();
</script>

</body>
</html>
